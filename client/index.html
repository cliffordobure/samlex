<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Comprehensive law firm management and case tracking system" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Samlex" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/icon-192x192.png" />
    <title>Samlex - Law Firm SaaS</title>
    <style>
      /* Loading fallback */
      #root:empty::before {
        content: "Loading...";
        display: block;
        padding: 20px;
        text-align: center;
        color: #666;
      }
      /* Error fallback */
      .error-fallback {
        padding: 20px;
        background: #fee;
        color: #c33;
        border: 1px solid #c33;
        margin: 20px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="padding: 20px; text-align: center;">
        <h1>Loading Application...</h1>
        <p>If this message persists, check the browser console for errors.</p>
      </div>
    </div>
    <script>
      // Capture ALL errors immediately
      const errors = [];
      const originalConsoleError = console.error;
      console.error = function() {
        errors.push(Array.from(arguments));
        originalConsoleError.apply(console, arguments);
      };
      
      // Immediate error logging - CAPTURE PHASE to catch module errors
      window.addEventListener('error', function(e) {
        console.error('❌❌❌ ERROR EVENT CAUGHT ❌❌❌');
        console.error('Global error:', e.error);
        console.error('Error details:', {
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          error: e.error,
          stack: e.error ? e.error.stack : 'No stack'
        });
        
        // Show error immediately
        const root = document.getElementById('root');
        if (root) {
          const errorHtml = '<div class="error-fallback" style="padding: 20px; background: #fee; border: 2px solid #c33; margin: 20px; border-radius: 4px; color: #c33;"><h2>❌ JavaScript Error Detected</h2><p><strong>Error Message:</strong> ' + e.message + '</p><p><strong>File:</strong> ' + (e.filename || 'unknown') + '</p><p><strong>Line:</strong> ' + (e.lineno || 'unknown') + '</p><pre style="background: #fff; padding: 10px; overflow: auto; white-space: pre-wrap;">' + (e.error ? e.error.stack : 'No stack trace available') + '</pre><p><small>Check browser console (F12) for more details</small></p></div>';
          root.innerHTML = errorHtml;
        }
      }, true); // Use capture phase
      
      // Log script loading errors
      window.addEventListener('error', function(e) {
        console.error('❌ ERROR EVENT CAUGHT:', {
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          error: e.error,
          target: e.target
        });
        
        if (e.target && e.target.tagName === 'SCRIPT') {
          console.error('❌ Script loading error:', {
            src: e.target.src,
            error: e.message,
            filename: e.filename,
            lineno: e.lineno
          });
          const root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div class="error-fallback"><h2>Script Loading Error</h2><p>Failed to load: ' + e.target.src + '</p><p>Error: ' + e.message + '</p><p>File: ' + (e.filename || 'unknown') + '</p><p>Line: ' + (e.lineno || 'unknown') + '</p><p>Check Network tab for details.</p></div>';
          }
        } else {
          // Any other error
          console.error('❌ Runtime error:', e.message);
          const root = document.getElementById('root');
          if (root && root.innerHTML.includes('Loading')) {
            root.innerHTML = '<div class="error-fallback"><h2>JavaScript Error</h2><p><strong>Error:</strong> ' + e.message + '</p><p><strong>File:</strong> ' + (e.filename || 'unknown') + '</p><p><strong>Line:</strong> ' + (e.lineno || 'unknown') + '</p><pre style="background: #fff; padding: 10px; overflow: auto;">' + (e.error ? e.error.stack : 'No stack trace') + '</pre></div>';
          }
        }
      }, true);
      
      // Log when page loads
      console.log('HTML loaded, attempting to load main.jsx...');
      console.log('Current URL:', window.location.href);
      console.log('User Agent:', navigator.userAgent);
      
      // Check if script loads after a timeout
      setTimeout(function() {
        if (!window.__APP_LOADED__) {
          console.error('⚠️ App did not load within 5 seconds');
          console.log('Checking for script errors...');
          const scripts = document.querySelectorAll('script[type="module"]');
          console.log('Found', scripts.length, 'module scripts');
          scripts.forEach(function(script, index) {
            console.log('Script', index + ':', script.src || 'inline');
            if (script.src) {
              // Try to fetch the script to see if it exists
              fetch(script.src)
                .then(function(response) {
                  console.log('Script', script.src, 'status:', response.status);
                  if (!response.ok) {
                    console.error('❌ Script file not found or error:', response.status, response.statusText);
                    const root = document.getElementById('root');
                    if (root) {
                      root.innerHTML = '<div class="error-fallback"><h2>Script Not Found</h2><p>Failed to load: ' + script.src + '</p><p>Status: ' + response.status + ' ' + response.statusText + '</p><p>This usually means the build did not complete correctly or the file path is wrong.</p><p>Check Vercel build logs for errors.</p></div>';
                    }
                  } else {
                    console.log('✅ Script file exists and is accessible');
                    // Try to read the script content to check if it's valid
                    response.text().then(function(scriptContent) {
                      console.log('📄 Script file size:', scriptContent.length, 'characters');
                      
                      // 711 characters is WAY too small for a React app!
                      if (scriptContent.length < 5000) {
                        console.error('⚠️⚠️⚠️ CRITICAL: Script file is VERY small!');
                        console.error('A React app bundle should be hundreds of KB, not ' + scriptContent.length + ' characters!');
                        console.error('This suggests the build failed or is incomplete.');
                        console.log('📝 Full script content:');
                        console.log(scriptContent);
                        
                        // Check if it's trying to load other chunks
                        if (scriptContent.includes('import') && scriptContent.includes('assets/')) {
                          console.error('⚠️ This appears to be a chunk loader trying to load other chunks');
                          console.error('The build might have failed to generate all required chunks');
                        }
                        
                        const root = document.getElementById('root');
                        if (root) {
                          root.innerHTML = '<div class="error-fallback" style="padding: 20px; background: #fee; border: 2px solid #c33; margin: 20px; border-radius: 4px; color: #c33;"><h2>❌ Build Issue Detected</h2><p><strong>Problem:</strong> The JavaScript file is only ' + scriptContent.length + ' characters, which is too small for a React application.</p><p>A normal React app bundle should be hundreds of KB or several MB.</p><p><strong>This usually means:</strong></p><ul><li>The Vercel build failed or was incomplete</li><li>The build output is corrupted</li><li>Only a chunk loader was generated, not the actual app code</li><li>Check Vercel build logs for errors</li></ul><p><strong>Script content:</strong></p><pre style="background: #fff; padding: 10px; overflow: auto; font-size: 10px;">' + scriptContent.substring(0, 500) + '</pre></div>';
                        }
                        return;
                      }
                      
                      // Check if it looks like valid JavaScript
                      if (scriptContent.includes('import') || scriptContent.includes('export') || scriptContent.includes('function') || scriptContent.includes('React')) {
                        console.log('✅ Script appears to contain valid JavaScript');
                      } else {
                        console.error('⚠️ Script content might be invalid or empty');
                        console.log('First 500 characters:', scriptContent.substring(0, 500));
                      }
                      
                      // Check if main.jsx executed
                      if (!window.__APP_LOADING__ && !window.__APP_LOADED__) {
                        console.error('❌ Script loaded but main.jsx did not execute!');
                        console.error('This means there is a JavaScript error preventing execution.');
                        console.error('The script file loaded successfully but the code inside failed to run.');
                        console.error('This is usually caused by:');
                        console.error('1. Syntax error in the bundled code');
                        console.error('2. Import/module resolution error');
                        console.error('3. Runtime error during module initialization');
                        console.error('Check Console tab above for red error messages with file names and line numbers.');
                      }
                    }).catch(function(err) {
                      console.error('Error reading script content:', err);
                    });
                  }
                })
                .catch(function(error) {
                  console.error('❌ Error checking script:', error);
                });
            }
          });
          
          // Check for console errors
          const originalError = console.error;
          let errorCount = 0;
          console.error = function() {
            errorCount++;
            originalError.apply(console, arguments);
          };
          
          // Show diagnostic message with collected errors
          const root = document.getElementById('root');
          if (root && !root.innerHTML.includes('error-fallback')) {
            let errorSummary = '';
            if (errors.length > 0) {
              errorSummary = '<div style="background: #fee; padding: 10px; margin: 10px 0; border-radius: 4px;"><strong>Errors captured:</strong><ul>';
              errors.forEach(function(err, idx) {
                errorSummary += '<li>' + JSON.stringify(err) + '</li>';
              });
              errorSummary += '</ul></div>';
            }
            
            root.innerHTML = '<div style="padding: 20px; text-align: center; background: #fff3cd; border: 2px solid #ffc107; margin: 20px; border-radius: 4px;"><h2>⚠️ Application Not Loading</h2><p>The script file loaded successfully (status 200) but the JavaScript code inside is NOT executing.</p><p><strong>This means there is a JavaScript error preventing the code from running.</strong></p>' + errorSummary + '<p><strong>What to check:</strong></p><ol style="text-align: left; display: inline-block;"><li>Look in the <strong>Console tab</strong> for red error messages</li><li>Check if you see "🚀 main.jsx script started" - if NOT, the script failed before first line</li><li>Look for errors with file names like "index-D1ymCBAx.js"</li><li>Check Vercel build logs for build errors</li></ol><p><small>Scroll up in the Console tab to see the actual error message</small></p></div>';
          }
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('✅ Service Worker registered successfully:', registration.scope);
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }
    </script>
    <noscript>
      <div style="padding: 20px; text-align: center; background: #fee; color: #c33;">
        <h1>JavaScript is Required</h1>
        <p>Please enable JavaScript to use this application.</p>
      </div>
    </noscript>
  </body>
</html>
